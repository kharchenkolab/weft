ClusterName=weft
SlurmctldHost=weftslurm
AuthType=auth/munge
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_CPU_Memory
SlurmdParameters=config_overrides
ReturnToService=2
SlurmctldPidFile=/run/slurmctld.pid
SlurmdPidFile=/run/slurmd.pid
SlurmdSpoolDir=/var/spool/slurmd
StateSaveLocation=/var/spool/slurmctld
SlurmUser=slurm
SlurmdUser=root
MinJobAge=3600
JobAcctGatherType=jobacct_gather/linux
AccountingStorageType=accounting_storage/none
# deliberately small "cluster" so capability limits are stable in tests.
# Fake GRES (CountOnly: no device files) + node features let discovery
# tests exercise the real sinfo/scontrol paths without hardware.
GresTypes=gpu
NodeName=weftslurm CPUs=8 RealMemory=4000 Gres=gpu:fake:2 Feature=avx512,fakegpu State=UNKNOWN
PartitionName=standard Nodes=weftslurm Default=YES MaxTime=01:00:00 State=UP
PartitionName=short Nodes=weftslurm MaxTime=00:01:00 State=UP
PartitionName=gpu Nodes=weftslurm MaxTime=02:00:00 State=UP
